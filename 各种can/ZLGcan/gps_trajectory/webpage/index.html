<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no, width=device-width">
    <title>Map</title>
    <link rel="stylesheet" href="https://cache.amap.com/lbs/static/main1119.css"/>
    <script src="https://webapi.amap.com/maps?v=1.4.8&key=d0fca475f61d260a1f08eb8946b9866f"></script>
    <script type="text/javascript" src="https://cache.amap.com/lbs/static/addToolbar.js"></script>
	<script type="text/javascript" src="converter.js"></script>
    
</head>
<body>
<div id="container"></div>

<script>
var map;
var pois = [];
var times = [];
var speeds = [];
var conv;
var startIcon;
var endIcon;
var color;
var width;

init();

// 初始化地图
function init()
{
	if (!window.AMap) {
		document.getElementById("container").innerText = "无法访问地图!";
		return;
	}
	
	// 初始化转换器
	conv = new Convertor();
	
	// 初始化画笔
	color = "#3298FF";
	width = 5;
	
	// 初始化Map
    map = new AMap.Map('container', {
        resizeEnable: true,       // 使能缩放
        center: [113.32, 23.128], // 中心点，广州
        zoom: 13                  // 缩放级别
    });
	
	// 自定义ICON
	startIcon = new AMap.Icon({            
		size: new AMap.Size(36,40),  
		image: "start.png",
		imageOffset: new AMap.Pixel(0, 0),
		imageSize: new AMap.Size(36,40)
	}); 

	// 自定义ICON
	endIcon = new AMap.Icon({            
		size: new AMap.Size(36,46),  
		image: "myicon.png",
		imageOffset: new AMap.Pixel(0, 10),
		imageSize: new AMap.Size(36, 36)
	}); 
}

// 清除轨迹
function clear()
{
	if (!window.AMap) return;
	pois = [];
	times = [];
	speeds = [];
	map.clearMap();
}

// 添加点
function add(lng_, lat_, time_, speed_)
{
	if (!window.AMap) return;
	var lng = parseFloat(lng_);
	var lat = parseFloat(lat_);
	var r = conv.WGS2GCJ({lng:parseFloat(lng_), lat:parseFloat(lat_)}); 
	if (!r) return;
	var gps = new AMap.LngLat(r.lng, r.lat);//标准写法[lng, lat];
	pois.push(gps);
	showNodes();
}

// 轨迹居中
function center()
{
	if (!window.AMap) return;
	showNodes();
	map.setFitView();
}

// 刷新轨迹
function showNodes()
{
	if (!window.AMap) return;
	draw();
}

// 设置画笔
function setStroke(color_, width_)
{
	if (!window.AMap) return;
	
	color = color_;
	width = Number(width_);
	
	showNodes();
}

function updateEndIcon(filepath)
{
	endIcon = new AMap.Icon({            
		size: new AMap.Size(36,46),  
		image: filepath,
		imageOffset: new AMap.Pixel(0, 10),
		imageSize: new AMap.Size(36, 36)
	}); 
	showNodes();
}

// 绘制轨迹
function draw()
{
	if (!window.AMap) return;
	
	// 清除所有覆盖物
	map.clearMap();
	
	if (pois.length == 0) return;
	
	// 绘制折线
	var	polyline = new AMap.Polyline({
        strokeColor: color, //线颜色
        strokeOpacity: 1,       //线透明度
        strokeWeight: width,    //线宽
        strokeStyle: "solid",   //线样式
        strokeDasharray: [10, 5], //补充线样式
		lineJoin: "round",
		bubble: true
    });
	polyline.setPath(pois);	
	polyline.setMap(map);

	// 起点图标
	var marker = new AMap.Marker({
		position: pois[0],
		offset: new AMap.Pixel(-16, -38),
		icon: startIcon,
	});
	map.add(marker);
	
	// 终点图标
	var marker = new AMap.Marker({
		position: pois[pois.length - 1],
		icon: endIcon,
	});
	map.add(marker);
}
	
</script>
</body>
</html>
