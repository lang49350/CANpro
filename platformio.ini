; 硬件：ESP32-S3-N16R8 (16MB Flash + 8MB PSRAM) + 2×CAN2518FD
[env:unified]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3

; 🔧 修复：正确配置 ESP32-S3-N16R8 (16MB Flash + 8MB OPI PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.partitions = default_16MB.csv

lib_deps = 
    ;pierremolinaro/ACAN2517FD@^2.1.7

build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0    ; 🔧 强制关闭核心层调试（防止TUSB报错混入USB数据流）
    -D APP_DEBUG_MODE=0      ; 0=开启调试输出, 1=关闭所有调试输出
    -D USE_TINYUSB=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -Wl,--allow-multiple-definition
    -O2

board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
